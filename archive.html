<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Archive | ArchiveOne</title>

<style>
  body {
    margin: 0;
    background-color: #0a0a0a;
    color: #f5f5f5;
    font-family: Arial, Helvetica, sans-serif;
  }

  .container {
    max-width: 600px;
    margin: 100px auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  h2 { font-weight: 400; }

  .secondary-text {
    font-size: 16px;
    opacity: 0.6;
    color: #f5f5f5;
    letter-spacing: 0.5px;
    text-decoration: none;
    transition: opacity 0.3s ease;
  }

  .secondary-text:hover { opacity: 1; }

  .back-button {
    position: absolute;
    bottom: 30px;
    left: 30px;
  }

  input, select, textarea {
    background-color: #0a0a0a;
    border: 1px solid #333;
    color: #f5f5f5;
    padding: 10px;
    font-family: Arial, Helvetica, sans-serif;
  }

  select { appearance: none; }
  option { background-color: #0a0a0a; color: #f5f5f5; }

  button {
    background: transparent;
    border: 1px solid #555;
    color: #f5f5f5;
    padding: 10px;
    cursor: pointer;
    transition: all 0.3s;
  }
  
  button:hover {
    background: #f5f5f5;
    color: #0a0a0a;
  }
</style>
</head>

<body>

<a href="index.html" class="secondary-text back-button" onclick="localStorage.removeItem('editando')">← Back</a>

<div class="container">
  <h2 id="page-title">New Entry</h2>

  <input id="title" type="text" placeholder="Title">

  <select id="category">
    <option>Articles</option>
    <option>Books</option>
    <option>Interviews</option>
    <option>Movies</option>
    <option>Podcasts</option>
    <option>Series</option>
    <option>Songs</option>
    <option>TV Shows</option>
  </select>

  <input id="date" type="date">

  <input id="rating" type="number" placeholder="Rating (1-5)" min="1" max="5">

  <textarea id="notes" placeholder="Notes" rows="5"></textarea>

  <button id="main-button" onclick="salvar()">Add to Archive</button>
</div>

<script>
// --- LÓGICA DE CARREGAMENTO (EDITAR) ---
window.onload = function() {
  const editandoId = localStorage.getItem("editando");
  
  if (editandoId) {
    const dados = JSON.parse(localStorage.getItem("archive")) || [];
    const item = dados.find(i => i.id == editandoId);

    if (item) {
      // Muda os textos da página
      document.getElementById("page-title").innerText = "Edit Entry";
      document.getElementById("main-button").innerText = "Update Archive";

      // Preenche os campos
      document.getElementById("title").value = item.title || "";
      document.getElementById("category").value = item.category || "Podcasts";
      document.getElementById("date").value = item.date || "";
      document.getElementById("rating").value = item.rating || "";
      document.getElementById("notes").value = item.notes || "";
    }
  }
};

// --- LÓGICA DE SALVAMENTO ---
function salvar() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const date = document.getElementById("date").value;
  const rating = document.getElementById("rating").value;
  const notes = document.getElementById("notes").value;

  let dados = JSON.parse(localStorage.getItem("archive")) || [];
  const editandoId = localStorage.getItem("editando");

  if (editandoId) {
    // Modo Edição: Localiza e substitui
    const index = dados.findIndex(i => i.id == editandoId);
    if (index !== -1) {
      dados[index] = {
        id: Number(editandoId), // Mantém o ID original
        title,
        category,
        date,
        rating,
        notes
      };
    }
    localStorage.removeItem("editando"); // Limpa após salvar
  } else {
    // Modo Novo Item
    const novoItem = {
      id: Date.now(),
      title,
      category,
      date,
      rating,
      notes
    };
    dados.push(novoItem);
  }

  localStorage.setItem("archive", JSON.stringify(dados));

  alert("Saved successfully!");

  // Redireciona para a página da categoria (ex: podcasts.html)
  const targetPage = category.toLowerCase().replace(" ", "") + ".html";
  window.location.href = targetPage;
}
</script>

</body>
</html>
