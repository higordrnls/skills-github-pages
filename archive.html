<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Archive | ArchiveOne</title>

<style>
  body {
    margin: 0;
    background-color: #0a0a0a;
    color: #f5f5f5;
    font-family: Arial, Helvetica, sans-serif;
  }
.back-button {
  position: absolute;
  bottom: 30px;
  left: 30px;
}
  .container {
    max-width: 600px;
    margin: 100px auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
<a href="index.html" class="secondary-text back-button">back</a>
  h2 {
    font-weight: 400;
  }

  input, select, textarea {
  background: transparent;
  border: 1px solid #333;
  color: #f5f5f5;
  padding: 10px;
}

  button {
    background: transparent;
    border: 1px solid #555;
    color: #f5f5f5;
    padding: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">
  <h2>New Entry</h2>

  <input id="title" type="text" placeholder="Title">

  <select id="category">
    <option>Articles</option>
    <option>Books</option>
    <option>Interviews</option>
    <option>Movies</option>
    <option>Podcasts</option>
    <option>Series</option>
    <option>Songs</option>
    <option>TV Shows</option>
  </select>

  <input id="date" type="date">

  <input id="rating" type="number" placeholder="Rating (1-5)" min="1" max="5">

  <textarea id="notes" placeholder="Notes"></textarea>

  <button onclick="salvar()">Add to Archive</button>
</div>

<script>
function salvar() {
  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;
  const date = document.getElementById("date").value;
  const rating = document.getElementById("rating").value;
  const notes = document.getElementById("notes").value;

  const novoItem = {
    title,
    category,
    date,
    rating,
    notes
  };

  let dados = JSON.parse(localStorage.getItem("archive")) || [];

  dados.push(novoItem);

  localStorage.setItem("archive", JSON.stringify(dados));

  alert("Salvo com sucesso");

  // limpa campos
  document.getElementById("title").value = "";
  document.getElementById("date").value = "";
  document.getElementById("rating").value = "";
  document.getElementById("notes").value = "";
}
</script>

</body>
</html>
