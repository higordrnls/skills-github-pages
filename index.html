<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ArchiveOne</title>

<style>
body {
  margin: 0;
  background-color: #0a0a0a;
  color: #f5f5f5;
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

/* ===== PRIMEIRA TELA (imutável) ===== */

.hero {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  flex-direction: column;
}

h1 {
  font-size: 48px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

p {
  font-size: 16px;
  opacity: 0.6;
}

/* ===== NOVA SEÇÃO ADICIONADA ===== */

.archive-preview {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  opacity: 0.3;
  font-size: 28px;
  letter-spacing: 1px;
  line-height: 60px;
}

.enter {
  position: absolute;
  bottom: 40px;
  font-size: 14px;
  opacity: 0.4;
}
</style>
</head>

<body>

<!-- SUA BASE ORIGINAL -->
<section class="hero">
  <h1>ArchiveOne</h1>
  <p>Everything you've ever been.</p>
</section>

<!-- ADIÇÃO -->
<section class="archive-preview">
  films<br>
  music<br>
  books<br>
  videos
  <div class="enter">enter archive</div>
</section>

</body>
</html>
