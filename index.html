<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ArchiveOne</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; background-color: #0a0a0a; color: #f5f5f5; font-family: Arial, Helvetica, sans-serif; height: 100vh; overflow: hidden; }
    .menu { position: absolute; top: 30px; width: 100%; display: flex; justify-content: center; gap: 60px; z-index: 1000; }
    
    /* PERFIL TOPO DIREITA */
    .profile-area { position: absolute; top: 25px; right: 30px; z-index: 1100; }
    .profile-trigger {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333;
      display: flex; align-items: center; justify-content: center; background: #1a1a1a; cursor: pointer; overflow: hidden;
    }
    .profile-trigger img { width: 100%; height: 100%; object-fit: cover; }
    .profile-trigger svg { width: 22px; height: 22px; fill: #666; }
    
    .profile-modal {
      position: absolute; top: 50px; right: 0; width: 280px; background: #0f0f0f; border: 1px solid #333;
      padding: 25px; display: none; flex-direction: column; gap: 12px; text-align: left;
    }
    .profile-modal.active { display: flex; }
    .profile-modal h3 { margin: 0; font-size: 11px; text-transform: uppercase; opacity: 0.4; letter-spacing: 1px; }
    .profile-modal input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; padding: 8px 0; font-size: 13px; outline: none; width: 100%; }
    .profile-modal input:focus { border-bottom-color: #f5f5f5; }

    .container { text-align: center; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    h1 { font-size: 48px; letter-spacing: 2px; margin-bottom: 10px; }
    .secondary-text { font-size: 16px; opacity: 0.6; color: #f5f5f5; letter-spacing: 0.5px; text-decoration: none; transition: opacity 0.3s ease; }

    .login-box { display: flex; flex-direction: column; gap: 15px; width: 250px; margin-top: 20px; }
    .btn-style { background: #f5f5f5; color: #0a0a0a; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; display: inline-block; font-size: 14px; text-align: center; }
    .btn-logout { background: #333; color: #fff; font-size: 11px; padding: 10px; margin-top: 5px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="menu">
    <a href="articles.html" class="secondary-text">Articles</a>
    <a href="books.html" class="secondary-text">Books</a>
    <a href="interviews.html" class="secondary-text">Interviews</a>
    <a href="movies.html" class="secondary-text">Movies</a>
    <a href="podcasts.html" class="secondary-text">Podcasts</a>
    <a href="series.html" class="secondary-text">Series</a>
    <a href="songs.html" class="secondary-text">Songs</a>
    <a href="tvshows.html" class="secondary-text">TV Shows</a>
  </nav>

  <div id="user-area" class="profile-area hidden">
    <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="uploadFoto(this)">
    <div class="profile-trigger" onclick="document.getElementById('file-upload').click()">
        <div id="avatar-container">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </div>
    
    <div class="profile-trigger" style="right: 50px; position: absolute;" onclick="document.getElementById('profile-modal').classList.toggle('active')">
        <svg style="width:18px; fill:#f5f5f5" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </div>

    <div class="profile-modal" id="profile-modal">
        <h3>Personal Data</h3>
        <input type="text" id="prof-name" placeholder="Full Name">
        <input type="text" id="prof-cpf" placeholder="CPF">
        <input type="text" id="prof-birth" placeholder="Data de Nascimento (Ex: 01/01/2000)">
        <input type="tel" id="prof-phone" placeholder="Phone">
        <input type="email" id="prof-email" placeholder="Email" disabled>
        <input type="password" id="prof-new-pass" placeholder="New Password (Optional)">
        
        <button class="btn-style" style="font-size: 11px; margin-top: 10px;" onclick="salvarTudo()">Update Profile</button>
        <button onclick="sair()" class="btn-style btn-logout">LOGOUT</button>
    </div>
  </div>

  <div class="container">
    <h1>ArchiveOne</h1>
    <p class="secondary-text" id="status-text">Everything you've ever been.</p>
    <div id="login-form" class="login-box hidden">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="pass" placeholder="Password">
      <button class="btn-style" onclick="entrar()">Login</button>
      <a href="register.html" class="btn-style" style="margin-top: 5px;">Register</a>
    </div>
    <div id="archive-links" class="hidden">
      <a href="archive.html" class="secondary-text">enter archive</a>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient('https://vnablodqafeqyuxxirnn.supabase.co', 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR');

    async function verificarSessao() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) {
        document.getElementById('archive-links').classList.remove('hidden');
        document.getElementById('user-area').classList.remove('hidden');
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('prof-email').value = session.user.email;
        carregarDadosPerfil(session.user.id);
      } else {
        document.getElementById('login-form').classList.remove('hidden');
      }
    }

    async function carregarDadosPerfil(userId) {
      const { data } = await _supabase.from('profiles').select('*').eq('id', userId).single();
      if (data) {
        document.getElementById('prof-name').value = data.full_name || '';
        document.getElementById('prof-cpf').value = data.cpf || '';
        document.getElementById('prof-birth').value = data.birth_date || '';
        document.getElementById('prof-phone').value = data.phone || '';
        if(data.avatar_url) document.getElementById('avatar-container').innerHTML = `<img src="${data.avatar_url}">`;
      }
    }

    async function uploadFoto(input) {
      const file = input.files[0];
      if (!file) return;
      const { data: { session } } = await _supabase.auth.getSession();
      const fileName = `${session.user.id}_avatar`;
      
      // Upload para o Storage (Certifique-se de criar o bucket 'avatars' no Supabase)
      const { data, error } = await _supabase.storage.from('avatars').upload(fileName, file, { upsert: true });
      
      if (error) alert("Erro upload: " + error.message);
      else {
        const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(fileName);
        await _supabase.from('profiles').upsert({ id: session.user.id, avatar_url: urlData.publicUrl });
        location.reload();
      }
    }

    async function salvarTudo() {
      const { data: { session } } = await _supabase.auth.getSession();
      
      // Salvar dados no banco
      const updates = {
        id: session.user.id,
        full_name: document.getElementById('prof-name').value,
        cpf: document.getElementById('prof-cpf').value,
        birth_date: document.getElementById('prof-birth').value,
        phone: document.getElementById('prof-phone').value,
      };
      await _supabase.from('profiles').upsert(updates);

      // Alterar senha se preenchido
      const newPass = document.getElementById('prof-new-pass').value;
      if (newPass) {
        const { error } = await _supabase.auth.updateUser({ password: newPass });
        if (error) alert("Erro senha: " + error.message);
      }

      alert("Profile updated!");
      location.reload();
    }

    async function entrar() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('pass').value;
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) alert(error.message); else verificarSessao();
    }

    async function sair() { await _supabase.auth.signOut(); location.reload(); }
    window.onload = verificarSessao;
  </script>
</body>
</html>
