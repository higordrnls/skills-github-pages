<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ArchiveOne</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== CSS ORIGINAL (SEM ALTERAÇÕES DE DESIGN) ===== */
    body { margin: 0; background-color: #0a0a0a; color: #f5f5f5; font-family: Arial, Helvetica, sans-serif; height: 100vh; }
    
    .menu {
      position: absolute;
      top: 30px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 60px;
      z-index: 1000;
    }

    .container {
      text-align: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 { font-size: 48px; letter-spacing: 2px; margin-bottom: 10px; }

    .secondary-text {
      font-size: 16px;
      opacity: 0.6;
      color: #f5f5f5;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .secondary-text:hover { opacity: 1; }

    /* Estilo funcional para o Login */
    .login-box { display: flex; flex-direction: column; gap: 15px; width: 250px; margin-top: 20px; }
    input { background: transparent; border: 1px solid #333; color: #fff; padding: 10px; outline: none; }
    button { background: #f5f5f5; color: #0a0a0a; border: none; padding: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="menu">
    <a href="articles.html" class="secondary-text">Articles</a>
    <a href="books.html" class="secondary-text">Books</a>
    <a href="interviews.html" class="secondary-text">Interviews</a>
    <a href="movies.html" class="secondary-text">Movies</a>
    <a href="podcasts.html" class="secondary-text">Podcasts</a>
    <a href="series.html" class="secondary-text">Series</a>
    <a href="songs.html" class="secondary-text">Songs</a>
    <a href="tvshows.html" class="secondary-text">TV Shows</a>
  </nav>

  <div class="container">
    <h1>ArchiveOne</h1>
    <p class="secondary-text" id="status-text">Everything you've ever been.</p>

    <div id="login-form" class="login-box hidden">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="pass" placeholder="Password">
      <button onclick="entrar()">Login</button>
    </div>

    <div id="archive-links" class="hidden">
      <a href="archive.html" class="secondary-text">enter archive</a>
      <div style="margin-top: 40px;">
        <button onclick="sair()" id="logout-btn">LOGOUT</button>
      </div>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://vnablodqafeqyuxxirnn.supabase.co';
    const supabaseKey = 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function verificarSessao() {
      const { data: { session } } = await _supabase.auth.getSession();
      
      const loginForm = document.getElementById('login-form');
      const archiveLinks = document.getElementById('archive-links');
      const statusText = document.getElementById('status-text');

      statusText.innerText = "Everything you've ever been.";

      if (session) {
        archiveLinks.classList.remove('hidden');
        loginForm.classList.add('hidden');
      } else {
        archiveLinks.classList.add('hidden');
        loginForm.classList.remove('hidden');
      }
    }

    async function entrar() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('pass').value;
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) alert(error.message);
      else verificarSessao();
    }

    async function sair() {
      await _supabase.auth.signOut();
      location.reload();
    }

    window.onload = verificarSessao;
  </script>
</body>
</html>
