<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ArchiveOne</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; background-color: #0a0a0a; color: #f5f5f5; font-family: Arial, Helvetica, sans-serif; height: 100vh; overflow: hidden; }
    
    /* MENU SUPERIOR */
    .menu { position: absolute; top: 30px; width: 100%; display: flex; justify-content: center; gap: 60px; z-index: 1000; }

    /* ÁREA DE PERFIL (LOGADO) */
    .profile-area { position: absolute; top: 25px; right: 30px; z-index: 1100; display: flex; align-items: center; gap: 15px; }
    .icon-btn { cursor: pointer; opacity: 0.6; transition: opacity 0.3s; display: flex; align-items: center; }
    .icon-btn:hover { opacity: 1; }
    .icon-btn svg { width: 20px; fill: #f5f5f5; }

    .profile-trigger {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333;
      display: flex; align-items: center; justify-content: center; background: #1a1a1a; cursor: pointer; overflow: hidden;
    }
    .profile-trigger img { width: 100%; height: 100%; object-fit: cover; }

    /* MODAL DE DADOS */
    .profile-modal {
      position: absolute; top: 55px; right: 0; width: 280px; background: #0f0f0f; border: 1px solid #333;
      padding: 25px; display: none; flex-direction: column; gap: 12px; text-align: left;
    }
    .profile-modal.active { display: flex; }
    .profile-modal h3 { margin: 0; font-size: 11px; text-transform: uppercase; opacity: 0.4; letter-spacing: 1px; }
    .profile-modal input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; padding: 8px 0; font-size: 13px; outline: none; width: 100%; }
    .profile-modal input:focus { border-bottom-color: #f5f5f5; }

    /* CONTAINER CENTRAL */
    .container { text-align: center; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    h1 { font-size: 48px; letter-spacing: 2px; margin-bottom: 10px; }
    
    .secondary-text { font-size: 16px; opacity: 0.6; color: #f5f5f5; letter-spacing: 0.5px; text-decoration: none; transition: opacity 0.3s ease; }
    .secondary-text:hover { opacity: 1; }

    /* FORMULÁRIO DE LOGIN */
    .login-box { display: flex; flex-direction: column; gap: 15px; width: 250px; margin-top: 20px; }
    .login-box input { background: transparent !important; border: 1px solid #333; color: #fff; padding: 10px; outline: none; font-size: 14px; }
    .login-box input:focus { border-color: #666; }

    .btn-login { background: #f5f5f5; color: #0a0a0a; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; width: 100%; }
    .btn-register { background: transparent; color: #f5f5f5; border: 1px solid #333; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; display: inline-block; font-size: 14px; margin-top: 5px; text-align: center; }

    /* TIMELINE (LINHA VERMELHA) */
    .timeline-wrapper {
      position: absolute;
      bottom: 85px; /* Altura da sua linha vermelha */
      width: 100%;
      overflow-x: auto;
      padding: 20px 0;
      white-space: nowrap;
      scrollbar-width: none;
      z-index: 500;
    }
    .timeline-wrapper::-webkit-scrollbar { display: none; }

    .timeline-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 2500px; /* Extensão da linha horizontal */
      height: 1px;
      background: rgba(245, 245, 245, 0.1);
      z-index: 1;
    }

    .timeline-items { display: inline-flex; gap: 120px; padding: 0 50vw; position: relative; z-index: 2; }

    .timeline-node { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
    .node-dot { width: 6px; height: 6px; background: #333; border-radius: 50%; margin-bottom: 12px; transition: 0.3s; }
    .node-year { font-size: 11px; letter-spacing: 1px; opacity: 0.3; transition: 0.3s; text-transform: uppercase; }

    .timeline-node:hover .node-dot { background: #666; }
    .timeline-node.active .node-dot { background: #f5f5f5; transform: scale(1.6); box-shadow: 0 0 10px rgba(255,255,255,0.4); }
    .timeline-node.active .node-year { opacity: 1; font-weight: bold; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="menu">
    <a href="articles.html" class="secondary-text">Articles</a>
    <a href="books.html" class="secondary-text">Books</a>
    <a href="interviews.html" class="secondary-text">Interviews</a>
    <a href="movies.html" class="secondary-text">Movies</a>
    <a href="podcasts.html" class="secondary-text">Podcasts</a>
    <a href="series.html" class="secondary-text">Series</a>
    <a href="songs.html" class="secondary-text">Songs</a>
    <a href="tvshows.html" class="secondary-text">TV Shows</a>
  </nav>

  <div id="user-area" class="profile-area hidden">
    <div class="icon-btn" onclick="compartilhar()"><svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg></div>
    <div class="icon-btn" onclick="document.getElementById('profile-modal').classList.toggle('active')"><svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></div>
    <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="uploadFoto(this)">
    <div class="profile-trigger" onclick="document.getElementById('file-upload').click()"><div id="avatar-container"><svg viewBox="0 0 24 24" style="width:22px; fill:#666;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div></div>
    
    <div class="profile-modal" id="profile-modal">
        <h3>Personal Data</h3>
        <input type="text" id="prof-name" placeholder="Full Name">
        <input type="text" id="prof-cpf" placeholder="CPF">
        <input type="text" id="prof-birth" placeholder="Data de Nascimento (Ex: 01/01/2000)">
        <input type="tel" id="prof-phone" placeholder="Phone">
        <input type="email" id="prof-email" placeholder="Email" disabled>
        <input type="password" id="prof-new-pass" placeholder="New Password">
        <input type="password" id="prof-confirm-pass" placeholder="Confirm New Password">
        <button class="btn-login" style="font-size: 11px; margin-top: 10px;" onclick="salvarTudo()">Update Profile</button>
        <button onclick="sair()" class="btn-register" style="width:100%; font-size: 11px; background:#333;">LOGOUT</button>
    </div>
  </div>

  <div class="container">
    <h1>ArchiveOne</h1>
    <p class="secondary-text">Everything you've ever been.</p>
    <div id="login-form" class="login-box hidden">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="pass" placeholder="Password">
      <button class="btn-login" onclick="entrar()">Login</button>
      <a href="register.html" class="btn-register">Register</a>
    </div>
    <div id="archive-links" class="hidden">
      <a href="archive.html" class="secondary-text">enter archive</a>
    </div>
  </div>

  <div class="timeline-wrapper hidden" id="timeline-area">
    <div class="timeline-line"></div>
    <div class="timeline-items">
      <div class="timeline-node" onclick="selectNode(this)"><div class="node-dot"></div><span class="node-year">2021</span></div>
      <div class="timeline-node" onclick="selectNode(this)"><div class="node-dot"></div><span class="node-year">2022</span></div>
      <div class="timeline-node" onclick="selectNode(this)"><div class="node-dot"></div><span class="node-year">2023</span></div>
      <div class="timeline-node" onclick="selectNode(this)"><div class="node-dot"></div><span class="node-year">2024</span></div>
      <div class="timeline-node active" onclick="selectNode(this)"><div class="node-dot"></div><span class="node-year">Now</span></div>
      <div class="timeline-node" onclick="selectNode(this)"><div class="node-dot"></div><span class="node-year">Future</span></div>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient('https://vnablodqafeqyuxxirnn.supabase.co', 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR');

    function selectNode(el) {
      document.querySelectorAll('.timeline-node').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
    }

    async function verificarSessao() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) {
        document.getElementById('archive-links').classList.remove('hidden');
        document.getElementById('user-area').classList.remove('hidden');
        document.getElementById('timeline-area').classList.remove('hidden');
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('prof-email').value = session.user.email;
        carregarDadosPerfil(session.user.id);
      } else {
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('timeline-area').classList.add('hidden');
      }
    }

    async function carregarDadosPerfil(userId) {
      const { data } = await _supabase.from('profiles').select('*').eq('id', userId).single();
      if (data) {
        if (data.avatar_url) document.getElementById('avatar-container').innerHTML = `<img src="${data.avatar_url}?t=${new Date().getTime()}">`;
        document.getElementById('prof-name').value = data.full_name || '';
        document.getElementById('prof-cpf').value = data.cpf || '';
        document.getElementById('prof-birth').value = data.birth_date || '';
        document.getElementById('prof-phone').value = data.phone || '';
      }
    }

    async function uploadFoto(input) {
      const file = input.files[0]; if (!file) return;
      const { data: { session } } = await _supabase.auth.getSession();
      const { error } = await _supabase.storage.from('avatars').upload(session.user.id, file, { upsert: true });
      if (error) alert("Erro: " + error.message);
      else {
        const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(session.user.id);
        await _supabase.from('profiles').upsert({ id: session.user.id, avatar_url: urlData.publicUrl });
        location.reload();
      }
    }

    async function salvarTudo() {
      const { data: { session } } = await _supabase.auth.getSession();
      const newPass = document.getElementById('prof-new-pass').value;
      if (newPass && newPass !== document.getElementById('prof-confirm-pass').value) return alert("Senhas não coincidem!");
      await _supabase.from('profiles').upsert({
        id: session.user.id, full_name: document.getElementById('prof-name').value,
        cpf: document.getElementById('prof-cpf').value, birth_date: document.getElementById('prof-birth').value, phone: document.getElementById('prof-phone').value,
      });
      if (newPass) await _supabase.auth.updateUser({ password: newPass });
      alert("Perfil atualizado!"); location.reload();
    }

    async function entrar() {
      const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('pass').value });
      if (error) alert(error.message); else verificarSessao();
    }

    function compartilhar() { navigator.share ? navigator.share({title:'ArchiveOne', url:window.location.href}) : alert("Link: "+window.location.href); }
    async function sair() { await _supabase.auth.signOut(); location.reload(); }
    window.onload = verificarSessao;
  </script>
</body>
</html>
