<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ArchiveOne</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { margin: 0; background-color: #0a0a0a; color: #f5f5f5; font-family: Arial, Helvetica, sans-serif; height: 100vh; overflow: hidden; }
    
    .menu { position: absolute; top: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
    .menu a { font-size: 14px; text-decoration: none; color: #f5f5f5; opacity: 0.6; transition: opacity 0.3s; }
    .menu a:hover { opacity: 1; }

    .container { text-align: center; height: 100vh; display: flex; justify-content: flex-start; padding-top: 20vh; align-items: center; flex-direction: column; }
    h1 { font-size: 48px; letter-spacing: 2px; margin-bottom: 10px; }
    .secondary-text { font-size: 16px; opacity: 0.6; color: #f5f5f5; letter-spacing: 0.5px; text-decoration: none; border: none !important; }

    /* TIMELINE WRAPPER - Ajustado para o card não cortar */
    .timeline-wrapper { 
      position: absolute; bottom: 0; width: 100%; 
      height: 350px; /* Aumentado para garantir espaço do card */
      overflow-x: auto; overflow-y: visible;
      scrollbar-width: none; z-index: 500; cursor: grab; user-select: none; 
    }
    .timeline-wrapper::-webkit-scrollbar { display: none; }
    
    /* LINHA DE FUNDO - Estendida */
    .timeline-line { position: absolute; top: 80%; left: 0; width: 20000px; height: 1px; background: rgba(245, 245, 245, 0.1); z-index: 1; }
    
    .timeline-items { 
      display: inline-flex; gap: var(--timeline-gap, 120px); 
      padding: 0 50vw; position: relative; top: 80%; transform: translateY(-50%);
      z-index: 2; transition: gap 0.1s ease-out; 
    }

    .timeline-node { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
    .node-dot { width: 6px; height: 6px; background: #333; border-radius: 50%; margin-bottom: 12px; transition: 0.3s; }
    .node-year { font-size: 10px; letter-spacing: 1px; opacity: 0.3; transition: 0.3s; text-transform: uppercase; }

    .node-dot.has-content { background: #f5f5f5 !important; box-shadow: 0 0 12px rgba(255, 255, 255, 0.8); width: 8px; height: 8px; }

    /* CARD DESIGN */
    .info-card {
      position: absolute; 
      bottom: 70px; /* Subido para não cortar */
      background: #0f0f0f; border: 1px solid #333;
      padding: 15px; width: 200px; white-space: normal; 
      display: none; flex-direction: column; gap: 6px; 
      pointer-events: none; text-align: left;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 2000;
    }
    /* LINHA CONECTORA */
    .info-card::after { 
      content: ''; position: absolute; bottom: -55px; left: 50%; 
      width: 1px; height: 55px; background: #f5f5f5; opacity: 0.4; 
    }
    
    .timeline-node.active .info-card { display: flex; }
    .card-title { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #f5f5f5; margin-bottom: 4px; display: block; border-bottom: 1px solid #222; padding-bottom: 4px; }
    .card-item { font-size: 10px; opacity: 0.7; display: block; line-height: 1.4; }

    .timeline-node.active .node-dot { background: #f5f5f5; transform: scale(1.6); }
    .timeline-node.active .node-year { opacity: 1; font-weight: bold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="menu">
    <a href="articles.html">Articles</a><a href="books.html">Books</a><a href="interviews.html">Interviews</a><a href="movies.html">Movies</a><a href="podcasts.html">Podcasts</a><a href="series.html">Series</a><a href="songs.html">Songs</a><a href="tvshows.html">TV Shows</a>
  </nav>

  <div class="container">
    <h1>ArchiveOne</h1>
    <p class="secondary-text">Everything you've ever been.</p>
    <div id="archive-links" class="hidden">
      <a href="archive.html" class="secondary-text" style="margin-top: 20px; display: inline-block;">enter archive</a>
    </div>
  </div>

  <div class="timeline-wrapper hidden" id="timeline-area">
    <div class="timeline-line"></div>
    <div class="timeline-items" id="timeline-content"></div>
  </div>

  <script>
    const _supabase = supabase.createClient('https://vnablodqafeqyuxxirnn.supabase.co', 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR');
    let currentZoom = 120;
    let logsByDate = {}; 
    let isDown = false;
    let startX;
    let scrollLeft;

    const timelineArea = document.getElementById('timeline-area');

    // ARRASTAR
    timelineArea.addEventListener('mousedown', (e) => {
      isDown = true;
      startX = e.pageX - timelineArea.offsetLeft;
      scrollLeft = timelineArea.scrollLeft;
    });
    timelineArea.addEventListener('mouseleave', () => isDown = false);
    timelineArea.addEventListener('mouseup', () => isDown = false);
    timelineArea.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - timelineArea.offsetLeft;
      const walk = (x - startX) * 2;
      timelineArea.scrollLeft = scrollLeft - walk;
    });

    // ZOOM
    timelineArea.addEventListener('wheel', (e) => {
      e.preventDefault();
      currentZoom = Math.min(Math.max(60, currentZoom + e.deltaY * -0.5), 1200);
      document.getElementById('timeline-content').style.setProperty('--timeline-gap', currentZoom + 'px');
      renderTimelineItems();
    }, { passive: false });

    async function verificarSessao() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) {
        document.getElementById('archive-links').classList.remove('hidden');
        document.getElementById('timeline-area').classList.remove('hidden');
        carregarRegistros(session.user.id);
      }
    }

    async function carregarRegistros(userId) {
      const tabelas = ['books', 'movies', 'songs', 'articles', 'podcasts', 'series', 'tvshows'];
      for (const t of tabelas) {
        const { data } = await _supabase.from(t).select('title, created_at').eq('user_id', userId);
        if (data) data.forEach(r => {
          // Normalização da data para evitar erros de fuso horário/horário
          const d = new Date(r.created_at);
          const iso = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          if (!logsByDate[iso]) logsByDate[iso] = [];
          logsByDate[iso].push(r.title);
        });
      }
      renderTimelineItems();
    }

    function renderTimelineItems() {
      const container = document.getElementById('timeline-content');
      let html = '';
      const hoje = new Date();

      if (currentZoom < 400) {
        for (let i = -3; i <= 1; i++) {
          const ano = hoje.getFullYear() + i;
          html += `<div class="timeline-node" onclick="selectNode(this)">
            <div class="node-dot"></div><span class="node-year">${ano}</span>
          </div>`;
        }
      } else {
        // Range estendido para garantir que a linha cubra março e além
        for (let i = -40; i <= 15; i++) {
          const d = new Date(); d.setDate(hoje.getDate() + i);
          const iso = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          const label = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
          const items = logsByDate[iso] || [];
          
          let cardHtml = `<div class="info-card">
            <span class="card-title">${d.toLocaleDateString('pt-BR')}</span>
            ${items.length > 0 ? items.map(t => `<span class="card-item">• ${t}</span>`).join('') : '<span class="card-item" style="opacity:0.3">Nenhum registro.</span>'}
          </div>`;

          html += `<div class="timeline-node ${i === 0 ? 'active' : ''}" onclick="selectNode(this)">
            ${cardHtml}<div class="node-dot ${items.length > 0 ? 'has-content' : ''}"></div>
            <span class="node-year">${label}</span>
          </div>`;
        }
      }
      container.innerHTML = html;
    }

    function selectNode(el) {
      document.querySelectorAll('.timeline-node').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
    }

    window.onload = verificarSessao;
  </script>
</body>
</html>
