<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Songs | ArchiveOne</title>
  <style>
    body { margin: 0; background-color: #0a0a0a; color: #f5f5f5; font-family: Arial, Helvetica, sans-serif; min-height: 100vh; overflow-y: scroll; }
    .menu { position: absolute; top: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 60px; z-index: 1000; }
    .menu a { text-decoration: none; }
    .secondary-text { font-size: 16px; opacity: 0.6; color: #f5f5f5; letter-spacing: 0.5px; text-decoration: none; transition: opacity 0.3s ease; }
    .secondary-text:hover { opacity: 1; }
    .container { max-width: 600px; margin: 150px auto 100px auto; display: flex; flex-direction: column; gap: 10px; text-align: center; }
    h2 { font-weight: 400; font-size: 32px; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.9; }
    .enter-archive { font-size: 16px; opacity: 0.4; color: #f5f5f5; text-decoration: none; letter-spacing: 1px; margin-bottom: 40px; display: inline-block; transition: opacity 0.3s; }
    .enter-archive:hover { opacity: 1; }
    .entry { text-align: left; position: relative; border-left: 1px solid #444; padding: 15px; opacity: 0.8; cursor: pointer; transition: background 0.3s ease; margin-bottom: 15px; }
    .entry:hover { background: #1a1a1a; }
    .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #f5f5f5; font-size: 18px; opacity: 0; cursor: pointer; transition: opacity 0.3s ease; z-index: 10; }
    .entry:hover .delete-btn { opacity: 0.6; }
    .delete-btn:hover { opacity: 1 !important; color: #ff4444; }
    .date { font-size: 12px; opacity: 0.5; }
    .title { font-size: 18px; margin-top: 5px; font-weight: bold; }
    .notes { font-size: 14px; opacity: 0.7; margin-top: 8px; line-height: 1.4; }
    .back-button { position: fixed; bottom: 30px; left: 30px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="menu">
    <a href="articles.html" class="secondary-text">Articles</a>
    <a href="books.html" class="secondary-text">Books</a>
    <a href="interviews.html" class="secondary-text">Interviews</a>
    <a href="movies.html" class="secondary-text">Movies</a>
    <a href="podcasts.html" class="secondary-text">Podcasts</a>
    <a href="series.html" class="secondary-text">Series</a>
    <a href="songs.html" class="secondary-text">Songs</a>
    <a href="tvshows.html" class="secondary-text">TV Shows</a>
  </nav>
  <div class="container">
    <h2>Songs</h2>
    <a href="archive.html" class="enter-archive" onclick="localStorage.removeItem('editando')">enter archive</a>
    <div id="timeline"></div>
  </div>
  <a href="index.html" class="secondary-text back-button">← Back</a>
<script>
const _supabase = supabase.createClient('https://vnablodqafeqyuxxirnn.supabase.co', 'sb_publishable_4uMYsIDc2Q9Cra31y8TOYg_q-RCGVYR');
async function excluir(event, id) {
  event.stopPropagation();
  if (confirm("Deseja realmente excluir este item?")) {
    const { error } = await _supabase.from('archive').delete().eq('id', id);
    if (error) alert(error.message); else location.reload();
  }
}
async function carregar() {
    const { data: itens } = await _supabase.from('archive').select('*').ilike('category', 'Songs').order('entry_date', { ascending: false });
    const timeline = document.getElementById("timeline");
    if (itens && itens.length > 0) {
        itens.forEach(item => {
            const div = document.createElement("div");
            div.className = "entry";
            div.onclick = () => { localStorage.setItem("editando", item.id); window.location.href = "archive.html"; };
            div.innerHTML = `<button class="delete-btn" onclick="excluir(event, ${item.id})">×</button><div class="date">${item.entry_date || ""}</div><div class="title">${item.title || "Untitled"}</div>${item.notes ? `<div class="notes">${item.notes}</div>` : ""}`;
            timeline.appendChild(div);
        });
    } else { timeline.innerHTML = `<p style="opacity:0.3; margin-top: 20px;">No entries found.</p>`; }
}
window.onload = carregar;
</script>
</body>
</html>
